name: CI Checks

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  building:
    name: Building
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      matrix:
        rust: [nightly, stable]
        include:
          - rust: nightly
            experimental: true
        os:
          - ubuntu-latest
          - macOS-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: thumbv6m-none-eabi
      - run: cargo install flip-link
      - run: cargo build --all
      - run: cargo build --all --release
  linting:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: thumbv6m-none-eabi
      - run: cargo clippy --all-features -- -D warnings
  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check
  host-tests:
    name: Host Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: pedalboard/pedalboard-protocol
          path: ../pedalboard-protocol
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path tests-host/Cargo.toml --target x86_64-unknown-linux-gnu
  firmware:
    name: Firmware UF2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - run: cargo install flip-link elf2uf2-rs
      - run: cargo build --release
      - run: elf2uf2-rs target/thumbv6m-none-eabi/release/pedalboard-midi
      - uses: actions/upload-artifact@v4
        with:
          name: pedalboard-midi.uf2
          path: target/thumbv6m-none-eabi/release/pedalboard-midi.uf2
